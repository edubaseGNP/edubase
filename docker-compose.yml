services:
  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${DB_NAME:-edubase}
      POSTGRES_USER: ${DB_USER:-edubase}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-edubase_secret}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-edubase}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - logs_volume:/app/logs
      - backups_volume:/app/backups
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: edubase.settings.dev
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  celery:
    build: .
    command: celery -A edubase worker --loglevel=info --concurrency=2 --queues=default
    volumes:
      - .:/app
      - media_volume:/app/media
      - logs_volume:/app/logs
      - backups_volume:/app/backups
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: edubase.settings.dev
      SKIP_MIGRATE: "1"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Dedicated AI/OCR worker: concurrency=1 ensures rate_limit='12/m' is truly global
  celery-ai:
    build: .
    command: celery -A edubase worker --loglevel=info --concurrency=1 --queues=ai_ocr --hostname=ai@%h
    volumes:
      - .:/app
      - media_volume:/app/media
      - logs_volume:/app/logs
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: edubase.settings.dev
      SKIP_MIGRATE: "1"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  celery-beat:
    build: .
    command: celery -A edubase beat --loglevel=info
    volumes:
      - .:/app
      - logs_volume:/app/logs
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: edubase.settings.dev
      SKIP_MIGRATE: "1"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Celery Flower – monitoring dashboard for task queues
  # Accessible at http://server:5555  (protect with FLOWER_USER / FLOWER_PASSWORD)
  flower:
    build: .
    command: >
      celery -A edubase flower
      --port=5555
      --basic_auth=${FLOWER_USER:-admin}:${FLOWER_PASSWORD:-change-me}
    ports:
      - "5555:5555"
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: edubase.settings.dev
      SKIP_MIGRATE: "1"
    depends_on:
      - redis
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Ollama – lokální AI inference (Vision OCR + text tasks), ZDARMA
  # Odkomentuj a nastav AI_BACKEND=ollama v .env
  # Po prvním spuštění stáhnout model:
  #   docker-compose exec ollama ollama pull llama3.2-vision
  #   docker-compose exec ollama ollama pull llama3.1
  # ---------------------------------------------------------------------------
