  #   #     reservations:
  #   #       devices:
  #   #         - driver: nvidia
  #   #           count: 1
  #   #           capabilities: [gpu]

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:
  logs_volume:
  backups_volume:
