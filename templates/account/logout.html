{% extends "base.html" %}
{% load i18n %}

{% block title %}{% trans "Odhlášení" %} – EduBase{% endblock %}

{% block content %}
<div class="min-h-[60vh] flex items-center justify-center px-4">
  <div class="card max-w-sm w-full text-center">
    <h2 class="text-xl font-semibold text-gray-900 mb-4">{% trans "Odhlášení" %}</h2>
    <p class="text-sm text-gray-500 mb-6">{% trans "Opravdu se chcete odhlásit?" %}</p>
    <form method="post">
      {% csrf_token %}
      <button type="submit" class="btn-primary w-full justify-center">{% trans "Odhlásit se" %}</button>
    </form>
    <a href="/" class="mt-3 block text-sm text-gray-400 hover:text-gray-600">{% trans "Zpět na hlavní stránku" %}</a>
  </div>
</div>
{% endblock %}
